name: Daily Wellness Content Generator

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 AM IST (00:30 UTC) every day
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write           # needed to commit topic_history.json back

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: content-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r content-agent/requirements.txt

      - name: Run content agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PIXAZO_API_KEY: ${{ secrets.PIXAZO_API_KEY }}
          PIXAZO_ENDPOINT: ${{ secrets.PIXAZO_ENDPOINT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python content-agent/agent.py

      - name: Commit topic history back (so tomorrow never repeats a topic)
        run: |
          git config user.name "content-agent[bot]"
          git config user.email "content-agent@users.noreply.github.com"
          git add content-agent/topic_history.json
          git diff --cached --quiet || git commit -m "chore: update topic history [skip ci]"
          git push

      - name: Upload generated content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-${{ github.run_number }}
          path: content-agent/output/
          retention-days: 14
